# spark_test — sourced by bin/spark-run.sh (bash syntax)
# 正式跑 spark/omni 时在环境中 export SPARK_HOME 或在此取消注释：
# SPARK_HOME=/opt/spark

SPARK_CONCURRENCY=4
DATA_BASE=tpcds_bin_partitioned_orc_1000
SQL_SUBDIR=sqls/spark-queries-tpcds
SPARK_REPORT_REL=report/hibench-spark.report

server_list=(server1)

spark_native=(
--deploy-mode client
--driver-cores 4
--driver-memory 8g
--master yarn
--executor-cores 8
--executor-memory 14g
--num-executors 31
--conf spark.executor.extraJavaOptions='-XX:+UseG1GC -XX:+UseNUMA'
--conf spark.locality.wait=0
--conf spark.network.timeout=600
--conf spark.serializer=org.apache.spark.serializer.KryoSerializer
--conf spark.sql.adaptive.enabled=true
--conf spark.sql.autoBroadcastJoinThreshold=30M
--conf spark.sql.broadcastTimeout=600
--conf spark.sql.shuffle.partitions=600
--conf spark.sql.orc.impl=native
--conf spark.executor.memoryOverhead=200m
--conf spark.task.cpus=1
)
